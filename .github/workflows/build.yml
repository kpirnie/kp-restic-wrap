name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"

      - name: Build linux/amd64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o kp-linux-amd64 .

      - name: Build linux/arm64
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags "-s -w" -o kp-linux-arm64 .

      - name: Checksums
        run: sha256sum kp-linux-amd64 kp-linux-arm64 > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kp-linux-amd64
            kp-linux-arm64
            checksums.txt
          generate_release_notes: true
